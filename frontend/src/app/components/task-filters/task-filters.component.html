<div class="card shadow-sm border-0 sticky-top" style="top: 100px;">
  <div class="card-body p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="h5 mb-0 fw-bold">Filters</h2>
      <button (click)="closeSidebar()" class="btn btn-sm btn-link text-muted p-0" title="Close Filters">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <form (ngSubmit)="applyFilters()" class="row g-3">
      <div class="col-12">
        <label for="taskName" class="form-label small text-muted text-uppercase fw-bold">Task Name</label>
        <input type="text" class="form-control" id="taskName" name="taskName" [(ngModel)]="filters.taskName" placeholder="Search by name...">
      </div>
      <div class="col-12">
        <label for="assignedTo" class="form-label small text-muted text-uppercase fw-bold">Assigned To</label>
        <select class="form-select" id="assignedTo" name="assignedTo" [(ngModel)]="filters.assignedTo">
          <option value="">All Users</option>
          @for (user of users(); track user.userId) {
            <option [value]="user.username">{{ user.username }}</option>
          }
        </select>
      </div>
      <div class="col-12">
        <label for="status" class="form-label small text-muted text-uppercase fw-bold">Status</label>
        <select class="form-select" id="status" name="status" [(ngModel)]="filters.status">
          <option value="">All Statuses</option>
          @for (s of statuses(); track s.statusTypeId) {
            <option [value]="s.statusName">{{ s.statusName }}</option>
          }
        </select>
      </div>
      <div class="col-12">
        <label for="dueDate" class="form-label small text-muted text-uppercase fw-bold">Due Date</label>
        <input type="date" class="form-control" id="dueDate" name="dueDate" [(ngModel)]="filters.dueDate">
      </div>
      <div class="col-12 mt-4 d-grid gap-2">
        <button type="submit" class="btn btn-primary rounded-pill fw-semibold shadow-sm">
          Apply Filters
        </button>
        <button type="button" (click)="resetFilters()" class="btn btn-outline-secondary rounded-pill fw-semibold shadow-sm">
          Reset Filters
        </button>
      </div>
    </form>
  </div>
</div>
