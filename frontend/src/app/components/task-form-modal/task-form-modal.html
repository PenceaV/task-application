<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-content border-0 shadow-lg" (click)="$event.stopPropagation()">
    <div class="modal-header border-0 pb-0 justify-content-between align-items-center mb-3">
      <h2 class="h5 mb-0 fw-bold">{{ isEditMode ? 'Edit Task' : 'Add Task'}}</h2>
      <button type="button" class="btn-close" (click)="closeModal()" aria-label="Close"></button>
    </div>

    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="text-start">
      <div class="mb-3">
        <label class="form-label fw-semibold small text-muted text-uppercase">Task name</label>
        <input formControlName="taskName" type="text" class="form-control rounded-3" placeholder="Introdu numele task-ului" />
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold small text-muted text-uppercase">Assigned to</label>
          <select formControlName="userId" class="form-select rounded-3">
            <option [value]="null" disabled>Alege user</option>
            @for (user of users(); track user.userId) {
              <option [value]="user.userId">{{ user.username }}</option>
            }
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold small text-muted text-uppercase">Status</label>
          <select formControlName="statusTypeId" class="form-select rounded-3">
            <option value="" disabled>Alege status</option>
            @for (status of statusTypes(); track status.statusTypeId) {
              <option [value]="status.statusTypeId">{{ status.statusName }}</option>
            }
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold small text-muted text-uppercase">Due date</label>
        <input formControlName="dueDate" type="datetime-local" class="form-control rounded-3" />
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold small text-muted text-uppercase">Created By</label>
        <input formControlName="createdBy" type="text" class="form-control rounded-3" placeholder="Numele tău" />
      </div>

      <div class="d-flex gap-2 justify-content-end">
        <button type="button" class="btn btn-light px-4 rounded-pill fw-semibold" (click)="closeModal()">Anulează</button>
        <button type="submit" class="btn btn-primary px-4 rounded-pill fw-semibold shadow-sm" [disabled]="taskForm.invalid">
          Salvează Task
        </button>
      </div>
    </form>
  </div>
</div>
