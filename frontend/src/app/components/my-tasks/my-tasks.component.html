<div class="card shadow-sm border-0 position-relative">
  <div class="card-body p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h4 mb-0 fw-bold">My Tasks</h1>
      <span class="badge rounded-pill bg-light text-dark border">{{ tasks().length }} Tasks</span>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th scope="col" class="text-uppercase small fw-bold text-muted">Name</th>
            <th scope="col" class="text-uppercase small fw-bold text-muted">Status</th>
            <th scope="col" class="text-uppercase small fw-bold text-muted">Due Date</th>
            <th scope="col" colspan="2" class="text-uppercase small fw-bold text-muted text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (task of tasks(); track task.taskId) {
            <tr>
              <td class="fw-medium">{{ task.taskName }}</td>
              <td>
                <span class="badge rounded-pill status-pill {{ task.statusType.statusName.toLowerCase().replace(' ', '-') }}">
                  {{ task.statusType.statusName }}
                </span>
              </td>
              <td class="text-muted ">{{ task.dueDate | date:'dd MMM yyyy, HH:mm' }}</td>
              <td class="text-center">
                <button (click)="openEditModal(task)" class="btn btn-sm btn-outline-secondary px-3">Edit</button>
              </td>
              <td class="text-center">
                <button (click)="deleteTask(task.taskId)" class="btn btn-sm btn-outline-danger px-3">Delete</button>
              </td>
            </tr>
          }
          @if (tasks().length === 0) {
            <tr>
              <td colspan="5" class="text-center py-5 text-muted fst-italic">No tasks found.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <div class="d-flex justify-content-end mt-4">
      <button (click)="openAddModal()" class="btn btn-primary rounded-pill btn-add-task shadow" title="Add new task">

        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span class="fw-semibold">Add Task</span>
      </button>
    </div>
  </div>
</div>

@if (isModalVisible) {
  <app-task-form-modal
    [task]="selectedTask"
    (close)="hideModal()"
    (saved)="loadTasks()">
  </app-task-form-modal>
}
