<table>
  <thead>
  <tr>
    <th scope="col">Name</th>
    <th scope="col">Status</th>
    <th scope="col">Due Date</th>
  </tr>
  </thead>
  <tbody>
    @for (task of tasks(); track task.taskId) {
      <tr>
        <td>{{ task.taskName }}</td>
        <td>{{ task.statusTypeId }}</td>
        <td>{{ task.dueDate }}</td>
      </tr>
    }
  </tbody>
  <tfoot>
  <tr>
    <th scope="row" colspan="2">Task count</th>
    <th>{{ tasks().length }}</th>
  </tr>
  </tfoot>
</table>
